{% extends 'main/base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body">
        <h5 class="card-title text-primary"><i class="bi bi-pencil-square"></i> Student Assessment</h5>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Select Subject</label>
                    <select name="subject" class="form-select border-primary" required>
                        <option value="" selected disabled>-- Select Subject --</option>
                        {% for subject in subjects %}
                            <option value="{{ subject.id }}">{{ subject.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="form-text text-muted">Subject List</div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 50px;">#</th>
                            <th>Student</th>
                            <th style="width: 150px;">Mark (0-100)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                        <tr>
                            <td>{{ forloop.counter }}</td>
                            <td class="fw-semibold">{{ student.first_name }} {{ student.last_name }}</td>
                            <td>
                                <input type="number" 
                                       name="grade_{{ student.id }}" 
                                       class="form-control form-control-sm grade-input" 
                                       placeholder="0-100" 
                                       min="0" 
                                       max="100">
                            </td>
                            <td>
                                <span class="badge rounded-pill bg-secondary status-badge">Not Entered</span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-success px-4">
                    <i class="bi bi-save"></i> Save Grades
                </button>
                <a href="{% url 'core:dashboard' %}" class="btn btn-outline-secondary px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Baho kiritilganda badge rangini o'zgartirish (interaktivlik uchun)
    document.querySelectorAll('.grade-input').forEach(input => {
        input.addEventListener('input', function() {
            let badge = this.closest('tr').querySelector('.status-badge');
            if (this.value !== "") {
                badge.textContent = "Tayyor";
                badge.className = "badge rounded-pill bg-info";
            } else {
                badge.textContent = "Kiritilmadi";
                badge.className = "badge rounded-pill bg-secondary";
            }
        });
    });
</script>
{% endblock %}
