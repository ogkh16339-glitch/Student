{% extends 'main/base.html' %}

{% block content %}
<style>
    /* 1. Sidebar va menyularni butunlay yashirish */
    aside, .sidebar, #sidebar, .left-menu, .vertical-nav, .nav-container { 
        display: none !important; 
    }

    /* 2. Asosiy kontentni ekranning oqi bo'ylab yoyish va chiziqlarni o'chirish */
    main, .main-content, #main, .content-wrapper {
        margin-left: 0 !important;
        padding-left: 0 !important;
        width: 100% !important;
        border-left: none !important;
        background: #f5f5f5; /* Sahifa foni toza bo'lishi uchun */
    }

    /* Natija konteyneri */
    .result-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        min-height: 100vh;
    }

    .stats-card {
        background: white;
        width: 100%;
        max-width: 500px;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        text-align: center;
        border: none;
    }

    .circular-progress {
        position: relative;
        height: 220px;
        width: 220px;
        border-radius: 50%;
        /* Rangni foizga qarab dinamik o'zgartirish */
        background: conic-gradient(
            {% if result.score_percentage >= 60 %}#2bbbad{% else %}#ff6b3d{% endif %} 
            calc({{ result.score_percentage }} * 3.6deg), 
            #ededed 0deg
        );
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 30px auto;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .circular-progress::before {
        content: "";
        position: absolute;
        height: 180px;
        width: 180px;
        border-radius: 50%;
        background-color: white;
    }

    .percentage {
        position: relative;
        font-size: 45px;
        font-weight: 800;
        color: #333;
    }

    .stat-box {
        display: flex;
        justify-content: space-around;
        margin-top: 30px;
        padding-top: 25px;
        border-top: 1px solid #f1f1f1; /* Faqat ichki ajratuvchi chiziq */
    }

    .stat-item h3 {
        margin: 0;
        font-size: 26px;
        font-weight: 700;
    }

    .stat-item p {
        margin: 5px 0 0 0;
        color: #888;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-back {
        display: inline-block;
        margin-top: 35px;
        padding: 15px 40px;
        background: #3a2f26;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-weight: bold;
        font-size: 16px;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn-back:hover {
        background: #2bbbad;
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(43, 187, 173, 0.3);
        color: white;
    }
</style>

<div class="result-container">
    <div class="stats-card">
        <h2 style="margin-bottom: 5px; color: #2d3436; font-weight: 800;">Test yakunlandi!</h2>
        <p style="color: #a0a0a0; margin-bottom: 35px; font-size: 15px;">{{ result.quiz.title }}</p>

        <div class="circular-progress">
            <span class="percentage">{{ result.score_percentage|floatformat:0 }}%</span>
        </div>

        <div class="stat-box">
            <div class="stat-item">
                <h3 style="color: #333;">{{ result.total_questions }}</h3>
                <p>Jami</p>
            </div>
            <div class="stat-item">
                <h3 style="color: #2bbbad;">{{ result.correct_answers }}</h3>
                <p>To'g'ri</p>
            </div>
            <div class="stat-item">
                <h3 style="color: #ff6b3d;">{{ wrong_answers }}</h3>
                <p>Xato</p>
            </div>
        </div>

        <a href="{% url 'quiz:quiz_list' %}" class="btn-back">Bosh sahifaga qaytish</a>
    </div>
</div>
{% endblock %}
