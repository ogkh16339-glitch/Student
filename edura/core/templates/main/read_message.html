<div class="card mt-4 shadow-sm border-0" style="border-radius: 15px;">
    <div class="card-body p-4">
        <h5 class="fw-bold mb-3"><i class="bi bi-reply text-primary"></i> Tezkor Javob</h5>
        
        <form action="{% url 'core:reply_message' message.pk %}" method="post">
            {% csrf_token %}
            <div class="mb-3">
                <textarea name="reply_text" class="form-control" rows="5" 
                          placeholder="Mijozga javob matnini shu yerga yozing..." required 
                          style="border-radius: 10px; border: 1px solid #dee2e6;"></textarea>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted small">Kimga: <strong>{{ message.email }}</strong></span>
                <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm">
                    <i class="bi bi-send me-2"></i> Javobni Yuborish
                </button>
            </div>
        </form>
    </div>
</div>
