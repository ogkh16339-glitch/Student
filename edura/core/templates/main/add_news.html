{% extends 'main/base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-4">Yangi yangilik qo'shish</h4>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary px-5 rounded-pill">Chop etish</button>
                    <a href="{% url 'core:dashboard' %}" class="btn btn-light px-4 rounded-pill">Bekor qilish</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
