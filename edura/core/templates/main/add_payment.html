{% extends 'main/base.html' %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow mb-4 border-left-primary">
                <div class="card-header py-3 bg-primary text-white d-flex align-items-center">
                    <i class="fas fa-money-bill-wave mr-2"></i>
                    <h6 class="m-0 font-weight-bold">Accept New Payment</h6>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="form-group mb-3">
                            <label class="form-label font-weight-bold text-dark">Select a Student</label>
                            <select name="student" class="form-control select2" required>
                                <option value="">--- Select from the list ---</option>
                                {% for student in students %}
                                    <option value="{{ student.id }}">
                                        {# Bu qism ism chiqishi uchun javobgar #}
                                        {% if student.first_name %}
                                            {{ student.first_name }} {{ student.last_name }}
                                        {% else %}
                                            {{ student }}
                                        {% endif %}
                                        
                                        {% if student.phone %} | {{ student.phone }}{% endif %}
                                    </option>
                                {% empty %}
                                    <option value="" disabled>No active students found in the database.!</option>
                                {% endfor %}
                            </select>
                            <small class="text-muted"><i class="fas fa-info-circle"></i> Only students with 'active' status are displayed.</small>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label font-weight-bold text-dark">Payment Amount (so'mda)</label>
                            <div class="input-group">
                                <input type="number" name="amount" class="form-control form-control-lg" placeholder="Masalan: 500000" required>
                                <div class="input-group-append">
                                    <span class="input-group-text">UZS</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-group mb-4">
                            <label class="form-label font-weight-bold text-dark">Payment Method</label>
                            <select name="payment_type" class="form-control" required>
                                <option value="cash">Cash</option>
                                <option value="card">Card (Click/Payme)</option>
                                <option value="bank">Bank Transfer</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between border-top pt-3">
                            <a href="{% url 'core:payment_list' %}" class="btn btn-light border px-4">
                                <i class="fas fa-arrow-left"></i> Back
                            </a>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm">
                                <i class="fas fa-save"></i> Save
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
