<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | Edura LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .brand-logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: #3a7bd5;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 2px solid #f0f4f8;
        }
        .form-control:focus {
            border-color: #3a7bd5;
            box-shadow: none;
        }
        .btn-login {
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">EDURA</div>
    <h5 class="text-center text-muted mb-4">Tizimga kirish</h5>

    {% if error %}
    <div class="alert alert-danger py-2 small text-center rounded-3">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label small fw-bold">Foydalanuvchi nomi</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Parol</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>
        </div>
        <button type="submit" class="btn btn-login shadow">KIRISH</button>
    </form>
    
    <div class="text-center mt-4">
        <a href="{% url 'core:news_list' %}" class="text-decoration-none small text-muted">
            <i class="bi bi-arrow-left"></i> Yangiliklarga qaytish
        </a>
    </div>
</div>

</body>
</html>
